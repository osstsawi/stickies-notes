name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    name: Compilar instalador y portable (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validar que los modulos compilan
        run: python -m py_compile (Get-ChildItem src/stickies_notes/*.py)

      # Se invoca el mismo script que documenta el README, para que lo que se
      # publica sea exactamente lo que un usuario obtiene al compilar en local.
      # Inno Setup ya viene instalado en la imagen windows-latest.
      - name: Compilar portable + onedir + instalador
        run: .\build\build_exe.ps1

      - name: Verificar que salieron los tres artefactos
        run: |
          $missing = @()
          foreach ($p in @("dist\StickiesNotes-Setup.exe", "dist\StickiesNotes.exe", "dist\StickiesNotes\StickiesNotes.exe")) {
            if (-not (Test-Path $p)) { $missing += $p }
          }
          if ($missing) { throw "Faltan artefactos: $($missing -join ', ')" }
          Get-ChildItem dist\*.exe | Select-Object Name, @{n="MB";e={[math]::Round($_.Length/1MB,1)}}

      - name: Publicar instalador
        uses: actions/upload-artifact@v7
        with:
          name: StickiesNotes-Setup
          path: dist/StickiesNotes-Setup.exe
          if-no-files-found: error

      - name: Publicar portable
        uses: actions/upload-artifact@v7
        with:
          name: StickiesNotes-portable
          path: dist/StickiesNotes.exe
          if-no-files-found: error

  linux:
    name: Validar codigo Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar tkinter
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-xlib pynput

      - name: Validar que los modulos compilan
        run: python -m py_compile src/stickies_notes/*.py

  release:
    name: Publicar release
    needs: [windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Crear release con instalador y portable
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/StickiesNotes-Setup.exe
            artifacts/StickiesNotes.exe
          generate_release_notes: true
